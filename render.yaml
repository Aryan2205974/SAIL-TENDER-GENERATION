services:
  - type: web
    name: tender-generation-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: api
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENROUTER_API_KEY
        value: "" # Put your OpenRouter API key here or enter it in the Render dashboard
